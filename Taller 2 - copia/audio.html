      <section class="grid-layout-section">
          <h2 class="grid-title">Grid Layout</h2>
          <p class="grid-subtitle">A Grid Layout must have a parent element with the <em>display</em> property set to <em>grid</em> or <em>inline-grid</em>.</p>
          
          <div class="custom-media-grid">
              <div class="media-cell text-cell">
                  <p>Uso de la etiqueta &lt;audio&gt; con un archivo local</p>
              </div>
              <div class="media-cell">
                  <audio controls>
                      <source src="music/SoundtrackZatura.mp3" type="audio/mpeg">
                  </audio>
              </div>
              <div class="media-cell">
                  <audio controls>
                      <source src="music/SoundtrackZatura.mp3" type="audio/mpeg">
                  </audio>
              </div>
              <div class="media-cell text-cell">
                  <p>Uso de la etiqueta &lt;iframe&gt; con un archivo externo</p>
              </div>
              <div class="media-cell">
                  <video controls width="100%" preload="metadata">
                      <source src="video/cat.mp4" type="video/mp4">
                  </video>
              </div>
              <div class="media-cell">
                  <iframe 
                      src="https://player.vimeo.com/video/76979871" 
                      width="100%" 
                      height="100%" 
                      frameborder="0" 
                      allow="autoplay; fullscreen; picture-in-picture" 
                      allowfullscreen>
                  </iframe>
              </div>
          </div>
